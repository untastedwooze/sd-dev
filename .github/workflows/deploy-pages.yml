name: Deploy to GitHub Pages

# Auto-deploys the static site on every push to main. No build step — the repo
# is uploaded and served as-is. Also runnable manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy needs: read the repo, write to Pages, and mint the
# OIDC token used by deploy-pages. Uses the built-in GITHUB_TOKEN — no secrets.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish; queue the latest push behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo root — the site is plain static files.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
